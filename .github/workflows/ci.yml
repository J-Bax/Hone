name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore harness-csharp/Hone.slnx

      - name: Build
        run: dotnet build harness-csharp/Hone.slnx --no-restore

      - name: Test
        run: dotnet test harness-csharp/Hone.slnx --no-build --verbosity normal
